services:
  backend:
    volumes:
      - ./back-end:/app

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      target: deps
    volumes:
      - ./front-end:/app
      - /app/node_modules
    environment:
      - API_BASE_URL=http://backend:5001
    command: ["npm", "run", "dev"]
